global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          servicio: 'sistema'

  - job_name: 'haproxy'
    static_configs:
      - targets: ['localhost:8405']
        labels:
          servicio: 'ldap_balanceador'
