# /etc/default/slapd (master, ldap1)
# El master escucha en 1388 (no 389) para dejar libre el puerto estandar,
# que HAProxy toma como front-end de ldap.fis.epn.edu.ec.
SLAPD_SERVICES="ldap://127.0.0.1:1388/ ldapi:/// ldaps:///"

# La replica (ldap2, contenedor Docker) usa la configuracion por defecto
# (puerto 389 dentro del contenedor), mapeada por Docker a 1389/1636 en el host:
#   docker run -d --name ldap2 --network ldap-net --hostname ldap2.fis.epn.edu.ec \
#     -p 1389:389 -p 1636:636 --add-host=host.docker.internal:host-gateway \
#     ubuntu:24.04 sleep infinity
