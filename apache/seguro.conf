# Puerto 80 - redireccion / vhost base
<VirtualHost *:80>
    ServerName webserver.fis.epn.edu.ec
    DocumentRoot /var/www/html

    <Directory /var/www/html/seguro>
        AuthType GSSAPI
        AuthName "Acceso Seguro FIS - Kerberos Web"
        GssapiCredStore keytab:/etc/apache2/http.keytab
        GssapiAllowedMech krb5
        GssapiBasicAuth On
        Require valid-user
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

# Puerto 443 - TLS con certificado emitido por la CA propia
<IfModule mod_ssl.c>
    <VirtualHost _default_:443>
        ServerName webserver.fis.epn.edu.ec
        DocumentRoot /var/www/html
        SSLEngine on
        SSLCertificateFile /etc/ssl/fis-pki/certs/webserver.crt
        SSLCertificateKeyFile /etc/ssl/fis-pki/certs/webserver.key
        SSLCACertificateFile /etc/ssl/fis-pki/ca/ca.crt

        <Directory /var/www/html/seguro>
            AuthType GSSAPI
            AuthName "FIS EPN Secure Access"
            GssapiCredStore keytab:/etc/apache2/http.keytab
            GssapiAllowedMech krb5
            GssapiBasicAuth Off
            Require valid-user
        </Directory>
    </VirtualHost>
</IfModule>

# Generacion del keytab de Apache (referencia, ejecutar en el KDC):
#   sudo kadmin.local -q "addprinc -randkey HTTP/webserver.fis.epn.edu.ec@FIS.EPN.EC"
#   sudo kadmin.local -q "ktadd -k /etc/apache2/http.keytab HTTP/webserver.fis.epn.edu.ec@FIS.EPN.EC"
#   sudo chown root:www-data /etc/apache2/http.keytab && sudo chmod 640 /etc/apache2/http.keytab
