[libdefaults]
    default_realm = FIS.EPN.EC
    dns_lookup_realm = false
    dns_lookup_kdc = false
    rdns = false

[realms]
    FIS.EPN.EC = {
        kdc = 127.0.0.1
        admin_server = 127.0.0.1
    }

[domain_realm]
    .fis.epn.edu.ec = FIS.EPN.EC
    fis.epn.edu.ec = FIS.EPN.EC

# Nota: rdns=false es critico. Sin esto, la libreria GSSAPI resuelve el
# hostname propio via DNS inverso y puede construir un Service Principal Name
# incorrecto (ver kerberos/windows-client-setup.md para el mismo problema
# del lado del cliente Windows).
